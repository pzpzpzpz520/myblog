server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: blog-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: blog-content
          uri: ${CONTENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:info}
    com.zzq.blog: ${LOGGING_LEVEL_APP:info}
