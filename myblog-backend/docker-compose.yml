version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: myblog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: myblog
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./blog-service-content/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./blog-service-content/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro

volumes:
  mysql-data:
